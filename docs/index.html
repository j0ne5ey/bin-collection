<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bin Collection</title>
<meta name="theme-color" content="#0f1115" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="ptr-indicator" class="ptr-indicator" aria-hidden="true">
  <svg class="ptr-arrow" viewBox="0 0 24 24" width="20" height="20" fill="none"
       stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19" />
    <polyline points="19 12 12 19 5 12" />
  </svg>
</div>

<main class="app">
  <header class="app-header">
    <h1>Bin Collection</h1>
  </header>

  <section id="next-card" class="next-card">
    <p class="loading">Loading…</p>
  </section>

  <section class="upcoming">
    <h2>Upcoming</h2>
    <ul id="upcoming-list" class="upcoming-list"></ul>
  </section>

  <footer class="app-footer">
    <p id="updated-text"></p>
    <p id="stale-warning" class="stale-warning" hidden>
      ⚠ Data hasn't updated in a while — showing the last known schedule.
    </p>
    <button id="refresh-btn" class="refresh-btn" type="button">
      <svg class="refresh-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path fill="currentColor" d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 13c0-4.42-3.58-8-8-8zm-6 8c0-1.01.25-1.97.7-2.8L5.24 8.74A7.93 7.93 0 0 0 4 13c0 4.42 3.58 8 8 8v3l4-4-4-4v3c-3.31 0-6-2.69-6-6z"/>
      </svg>
      <span>Refresh</span>
    </button>
  </footer>
</main>

<script src="app.js"></script>
</body>
</html>
