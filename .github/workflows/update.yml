name: Update bin collection data

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Fetch latest collection schedule
        env:
          SBC_POSTCODE: ${{ secrets.SBC_POSTCODE }}
          SBC_UPRN: ${{ secrets.SBC_UPRN }}
        run: python scraper/fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/data/collections.json; then
            echo "No changes to commit"
          else
            git add docs/data/collections.json
            git commit -m "Update bin collection schedule"
            git push
          fi
